<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Registration Successful | The TechX Challenge</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: var(--bg-app);
      padding: 20px;
    }
    .success-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px 32px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-xl);
      animation: scaleUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes scaleUp {
      from { transform: scale(0.9); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .success-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
      border-radius: var(--radius-full);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 40px;
      margin: 0 auto 24px;
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
      animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.2s both;
    }
    @keyframes bounceIn {
      0% { transform: scale(0); }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    .countdown-text {
      font-size: 13px;
      color: var(--text-light);
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="success-icon">
      <i class="fa-solid fa-check"></i>
    </div>
    <h2 style="font-size: 28px; margin-bottom: 12px; color: var(--text-main);">Registration Submitted!</h2>
    <p style="font-size: 15px; color: var(--text-muted); line-height: 1.6; margin-bottom: 24px;">
      Your team registration has been successfully recorded in the system. The organizers have been notified and your documents are now visible in the administrative portal.
    </p>
    <a href="index.html" class="btn btn-primary btn-block btn-lg" style="display: inline-flex; align-items: center; justify-content: center; gap: 8px;">
      <i class="fa-solid fa-house"></i> Return to Home Page
    </a>
    <div class="countdown-text" id="countdown-container">
      Redirecting to the Home Page in <span id="countdown-seconds" style="font-weight: 700; color: var(--primary);">5</span> seconds...
    </div>
  </div>

  <script>
    let secondsLeft = 5;
    const countdownEl = document.getElementById("countdown-seconds");
    const interval = setInterval(() => {
      secondsLeft--;
      if (countdownEl) countdownEl.textContent = secondsLeft;
      if (secondsLeft <= 0) {
        clearInterval(interval);
        window.location.href = "index.html";
      }
    }, 1000);
  </script>
</body>
</html>
